{% extends "employe/base.html" %}

{% block content %}
    <form method="POST" class="space-y-4 flex flex-col">
        {% csrf_token %}
        <span class="text-center">Êtes-vous sûr de vouloir supprimer <strong>{{employe.nom}}</strong></span>
        <button type="submit" class="btn btn-error">Oui, supprimer</button>
        <a href="{% url 'liste_employes' %}" class="btn btn-primary w-full">Annuler</a>
    </form>
{% endblock %}
